<div id="start-screen" class="container">
    <h1>مسابقة التحدي</h1>
    <div class="setup-box">
        <input type="text" id="name-team1" placeholder="اسم الفريق الأول" class="name-input">
        <input type="text" id="name-team2" placeholder="اسم الفريق الثاني" class="name-input">
        <button class="btn-start" onclick="saveNamesAndStart()">ابدأ المسابقة</button>
    </div>
</div>

<div class="scoreboard">
    <div id="team1-box" class="team-box active">
        <h2 id="display-name1">الفريق 1</h2>
        <div class="score-controls">
            <button class="adjust-btn" onclick="manualAdjust(0, -100)">-</button>
            <span id="score1" class="score">0</span>
            <button class="adjust-btn" onclick="manualAdjust(0, 100)">+</button>
        </div>
        <div class="perks">
            <button id="mute-p1" class="perk-btn" onclick="usePerk('mute', 0)">تسكيت 🔇</button>
        </div>
    </div>

    <div id="team2-box" class="team-box">
        <h2 id="display-name2">الفريق 2</h2>
        <div class="score-controls">
            <button class="adjust-btn" onclick="manualAdjust(1, -100)">-</button>
            <span id="score2" class="score">0</span>
            <button class="adjust-btn" onclick="manualAdjust(1, 100)">+</button>
        </div>
        <div class="perks">
            <button id="mute-p2" class="perk-btn" onclick="usePerk('mute', 1)">تسكيت 🔇</button>
        </div>
    </div>
</div>

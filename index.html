<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المعلومات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="side-menu" class="side-menu">
        <button class="menu-btn" onclick="restartGame()">إعادة اللعبة</button>
        <button class="menu-btn" onclick="showInstructions()">التعليمات</button>
        <button class="menu-btn" onclick="toggleMenu()" style="background:#ef4444">إغلاق</button>
    </div>

    <div class="container">
        <div id="start-screen" class="screen">
            <h1>🏆 مسابقة التحدي 🏆</h1>
            <input type="text" id="name-team1" placeholder="اسم الفريق الأول">
            <input type="text" id="name-team2" placeholder="اسم الفريق الثاني">
            <button onclick="startGame()" class="main-btn">بدء المسابقة</button>
        </div>

        <div id="category-screen" class="screen hidden">
            <h2>اختر 5 تصانيف للجولة</h2>
            <div id="categories-list" class="grid-categories"></div>
            <button id="confirm-cats-btn" class="main-btn" disabled onclick="startRound()">تأكيد التصانيف</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="game-header">
                <div id="team0-area" class="team-card">
                    <h3 id="display-name0">الفريق 1</h3>
                    <div id="score0" class="score">0</div>
                    <div class="perks-row">
                        <button id="double0" onclick="activatePerk('double')">تدبيل</button>
                        <button id="wheel0" onclick="activatePerk('wheel')">عجلة</button>
                        <button id="half0" onclick="activatePerk('half')">نصف</button>
                    </div>
                </div>

                <button class="settings-btn" onclick="toggleMenu()">⚙️</button>

                <div id="team1-area" class="team-card">
                    <h3 id="display-name1">الفريق 2</h3>
                    <div id="score1" class="score">0</div>
                    <div class="perks-row">
                        <button id="double1" onclick="activatePerk('double')">تدبيل</button>
                        <button id="wheel1" onclick="activatePerk('wheel')">عجلة</button>
                        <button id="half1" onclick="activatePerk('half')">نصف</button>
                    </div>
                </div>
            </div>

            <div id="board" class="board"></div>
        </div>
    </div>

    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-q">السؤال هنا؟</h2>
            <div id="ans-btns">
                <button onclick="checkResult(true)" class="ans-btn correct">صح ✅</button>
                <button onclick="checkResult(false)" class="ans-btn wrong">خطأ ❌</button>
            </div>
            <h3 id="modal-a" class="hidden">الإجابة: ...</h3>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

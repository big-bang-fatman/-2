<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المعلومات الكبرى</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="side-menu" class="side-menu">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <h3 style="text-align: center;">الإعدادات</h3>
        <hr>
        <button onclick="location.reload()">لعبة جديدة</button>
        <button onclick="location.reload()">القائمة الرئيسية</button>
        <button onclick="showInstructions()">التعليمات</button>
    </div>

    <button class="menu-trigger" onclick="toggleMenu()">☰</button>

    <div id="start-screen" class="container">
        <h1 class="main-title">تحدي المعلومات 🏆</h1>
        <button class="btn-start" onclick="showCategorySelection()">ابدأ اللعب</button>
    </div>

    <div id="category-selection-screen" class="container hidden">
        <h2>اختر 5 أقسام للمنافسة:</h2>
        <div id="categories-list" class="categories-grid"></div>
        <p>الأقسام المختارة: <span id="selected-count">0</span> / 5</p>
        <button id="start-round-btn" class="btn-start" onclick="confirmCategories()" disabled>تأكيد وابدأ</button>
    </div>

    <div id="main-game" class="hidden">
        <div class="header">
            <div id="team1-box" class="team-box">
                <div class="team-name">الفريق الأول</div>
                <div id="score1" class="score">0</div>
                <div class="perks">
                    <button id="mute-p1" class="perk-btn" onclick="usePerk('mute', 0)">تسكيت 🤐</button>
                    <button id="delete-p1" class="perk-btn" onclick="usePerk('delete', 0)">حذف 🗑️</button>
                </div>
            </div>

            <div id="team2-box" class="team-box">
                <div class="team-name">الفريق الثاني</div>
                <div id="score2" class="score">0</div>
                <div class="perks">
                    <button id="mute-p2" class="perk-btn" onclick="usePerk('mute', 1)">تسكيت 🤐</button>
                    <button id="delete-p2" class="perk-btn" onclick="usePerk('delete', 1)">حذف 🗑️</button>
                </div>
            </div>
        </div>

        <div id="game-board" class="board"></div>
    </div>

    <div id="question-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-genre" class="modal-title"></h2>
            
            <p id="modal-question-text" class="question-text"></p>
            
            <div id="power-ups-section" class="power-ups">
                <button onclick="usePowerUp('double')" class="btn-power">تدبيل X2</button>
                <button onclick="usePowerUp('wheel')" class="btn-power">العجلة 🎰</button>
                <button onclick="changeQuestion()" class="btn-power">تغيير السؤال</button>
            </div>

            <div id="wheel-result" class="wheel-msg hidden"></div>
            <h3 id="modal-answer" class="answer-text hidden"></h3>

            <div id="action-buttons">
                <button id="btn-reveal" onclick="revealAnswer()" class="btn-reveal">إظهار الإجابة</button>
                
                <div id="decision-section" class="action-btns hidden">
                    <button onclick="handleResult(true)" class="btn-correct">صح ✅</button>
                    <button onclick="handleResult(false)" class="btn-wrong">خطأ ❌</button>
                </div>

                <div id="steal-section" class="steal-container hidden">
                    <p>الجواب خطأ! هل يريد الفريق الآخر السرقة؟</p>
                    <div class="action-btns">
                        <button onclick="handleSteal(true)" class="btn-steal">سرقة 💰</button>
                        <button onclick="handleSteal(false)" class="btn-no-steal">لا أسرق ✋</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
